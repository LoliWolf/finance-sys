version: "2"
sql:
  - engine: "mysql"
    schema:
      - "../migrations/000001_init.up.sql"
    queries:
      - "query"
    gen:
      go:
        package: "sqlc"
        out: "../internal/repository/sqlc"
        sql_package: "database/sql"
        emit_json_tags: true
        emit_interface: true
